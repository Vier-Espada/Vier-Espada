<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vier Espada</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    color:white;
    overflow:hidden;
    font-family:Arial,sans-serif;
}

#rotateWarning{
    display:none;
}

@media (orientation: portrait){
    #rotateWarning{
        display:flex;
        position:fixed;
        inset:0;
        z-index:9999;
        background:#000;
        justify-content:center;
        align-items:center;
        text-align:center;
        padding:20px;
        font-size:1.5rem;
    }
}

.game-screen{
    width:min(100vw,177.78vh);
    aspect-ratio:16/9;
    margin:auto;
    position:relative;
    overflow:hidden;
}

.banner{
    width:100%;
    height:100%;
    object-fit:cover;
}

.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.35);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.logo{
    font-size:4rem;
    letter-spacing:4px;
    margin-bottom:20px;
}

.start{
    font-size:1.2rem;
    animation:blink 1.5s infinite;
}

@keyframes blink{
    50%{
        opacity:.3;
    }
}

.fade-out{
    animation:fadeOut .8s forwards;
}

@keyframes fadeOut{
    to{
        opacity:0;
    }
}
</style>
</head>

<body>

<div id="rotateWarning">
    画面を横に向けてください。
</div>

<div class="game-screen" id="screen">

    <img src="assets/banner.png" class="banner">

    <div class="overlay">
        <div class="logo"></div>
        <div class="start"></div>
    </div>

</div>

<script>
document.getElementById("screen").addEventListener("click",()=>{

    document.body.classList.add("fade-out");

    setTimeout(()=>{
        location.href="page/top/top.html";
    },800);

});
</script>

</body>
</html>
