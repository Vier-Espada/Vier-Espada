<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">

    <title>Vier Espada</title>

    <link rel="stylesheet" href="./top.css">
</head>

<body>

    <!-- 固定ナビバー -->
    <header class="navbar">

        <div id="guildNameNav" class="logo">
            Vier Espada
        </div>

        <nav>
            <button class="tab-btn" data-tab="main">Main</button>
            <button class="tab-btn" data-tab="members">メンバー</button>
            <button class="tab-btn" data-tab="gallery">ギャラリー</button>
            <button class="tab-btn" data-tab="links">リンク</button>
        </nav>

        <div class="socials">

            <a id="youtubeLink" target="_blank">YouTube</a>

            <button id="themeToggle">🌙</button>

        </div>

    </header>

    <!-- バナー -->
    <section class="hero">
        <img id="bannerImage" alt="Banner">
    </section>

    <!-- ギルド情報 -->
    <section class="guild-profile">

        <img id="guildIcon" alt="Guild Icon">

        <h1 id="guildName"></h1>

        <p id="guildDescription"></p>

    </section>

    <!-- Main -->
    <section id="main" class="tab-content active">

        <h2>Vier Espada</h2>

        <p>
            Chill Guild
        </p>

    </section>

    <!-- Members -->
    <section id="members" class="tab-content">

        <h2>メンバー</h2>

        <div id="memberList"></div>

    </section>

    <!-- Gallery -->
    <section id="gallery" class="tab-content">

        <h2>ギャラリー</h2>

        <p>Coming Soon...</p>

    </section>

    <!-- Links -->
    <section id="links" class="tab-content">

        <h2>リンク</h2>

        <div class="link-list">

            <a id="youtubeLink2" target="_blank">YouTube</a>


        </div>

    </section>

    <script src="./top.js"></script>

</body>

</html>
